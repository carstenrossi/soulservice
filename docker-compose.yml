services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    ports:
      - "6000:5432"
    environment:
      POSTGRES_DB: soulservice
      POSTGRES_USER: soulservice
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./infra/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soulservice"]
      interval: 5s
      timeout: 3s
      retries: 5

  mcp:
    build:
      context: .
      target: mcp
    ports:
      - "6001:8000"
    environment:
      # Owner connection: migrations + admin only
      DATABASE_URL: postgresql+asyncpg://soulservice:${POSTGRES_PASSWORD}@postgres:5432/soulservice
      # Restricted runtime connection (RLS-enforced)
      APP_DATABASE_URL: postgresql+asyncpg://soulservice_app:soulservice_app_pw@postgres:5432/soulservice
      SOULSERVICE_MASTER_KEY: ${SOULSERVICE_MASTER_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      SOULSERVICE_HOST: "0.0.0.0"
      SOULSERVICE_PORT: "8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro

  web:
    build:
      context: .
      target: web
    ports:
      - "127.0.0.1:6002:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://soulservice:${POSTGRES_PASSWORD}@postgres:5432/soulservice
      SOULSERVICE_MASTER_KEY: ${SOULSERVICE_MASTER_KEY}
      WEB_HOST: "0.0.0.0"
      WEB_BASE_URL: http://localhost:6002
      WEB_SESSION_SECRET: ${WEB_SESSION_SECRET:-}
      WEB_ADMIN_EMAILS: ${WEB_ADMIN_EMAILS:-}
      WEB_FROM_EMAIL: ${WEB_FROM_EMAIL:-soulservice@localhost}
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    profiles:
      - web  # Phase 3: docker compose --profile web up

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "127.0.0.1:6003:1025"
      - "127.0.0.1:6004:8025"
    profiles:
      - web  # Phase 3

volumes:
  postgres-data:
